<!DOCTYPE html>
<html>
<head>
<style>
  .container { width: 500px; overflow-x: auto; border: 1px solid red; }
  table { table-layout: fixed; width: max-content; border-collapse: collapse; }
  th, td { border: 1px solid black; }
</style>
</head>
<body>
<div class="container">
  <table>
    <tr>
      <th style="width: 200px">Col 1</th>
      <th style="width: 400px">Col 2</th>
      <th style="width: 300px">Col 3</th>
    </tr>
    <tr>
      <td>A</td>
      <td>B</td>
      <td>C</td>
    </tr>
  </table>
</div>
</body>
</html>
